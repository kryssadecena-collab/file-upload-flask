version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/file-upload-flask
    overwrite: true
permissions:
  - object: /home/ec2-user
    owner: ec2-user
    group: ec2-user
    type:
      - directory
hooks:
  ApplicationStop:
    - location: scripts/stop_flask.sh
      timeout: 30
      runas: ec2-user
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: ec2-user